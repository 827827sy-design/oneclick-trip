server:
  port: 8080

spring:
  application:
    name: oneclick-trip-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://127.0.0.1:3306/oneclick_trip?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  sql:
    init:
      mode: always
      encoding: UTF-8
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  internal-service:
    secret: ${AI_INTERNAL_SERVICE_SECRET:oneclick-trip-internal-dev-secret}
  jwt:
    secret: ${JWT_SECRET:oneclick-trip-dev-secret-change-before-prod}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
